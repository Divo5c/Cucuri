<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Lobby Chat</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Login Modal (am Anfang sichtbar) -->
  <div id="loginModal" class="modal-overlay">
    <div class="modal-content">
      <span class="close-btn" id="closeModal">&times;</span>
      <h2 id="modalTitle">Login</h2>
      <form id="authForm">
        <input type="text" id="username" placeholder="Benutzername" required>
        <input type="password" id="password" placeholder="Passwort" required>
        <button type="submit" id="submitBtn">Einloggen</button>
      </form>
      <p id="toggleLink">Kein Account? <span id="toggleText">Registrieren</span></p>
      <div id="errorMsg" class="error"></div>
    </div>
  </div>

  <!-- Chat (unsichtbar bis Login) -->
  <ul id="messages" style="display: none;"></ul>
  <form id="form" action="" style="display: none;">
    <input id="input" autocomplete="off" placeholder="Nachricht eingeben..." />
    <button>Senden</button>
  </form>

  <script src="/socket.io/socket.io.js"></script>
  <script src="script.js"></script>
</body>
</html>
