<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cucuri Chat</title>
  <link rel="stylesheet" href="style.css">
  <script src="/socket.io/socket.io.js"></script>
</head>
<body>

  <!-- Modal = Das Popup für Login/Registrieren -->
  <div id="authModal" class="modal active">
    <div class="modal-content">
      <span class="close" id="closeBtn">&times;</span>
      
      <!-- Einloggen -->
      <div id="loginTab" class="tab active">
        <h2>🔑 Einloggen</h2>
        <input type="text" id="loginUsername" placeholder="Username">
        <input type="password" id="loginPassword" placeholder="Passwort">
        <!-- WICHTIG: Die ID muss exakt loginBtn heißen -->
        <button id="loginBtn">Einloggen</button>
        <p id="loginError" class="error"></p>
        <a href="#" id="switchToRegister">Kein Account? Registrieren</a>
      </div>

      <!-- Registrieren -->
      <div id="registerTab" class="tab">
        <h2>👋 Willkommen! <br>Registrieren</h2>
        <input type="text" id="regUsername" placeholder="Username">
        <input type="password" id="regPassword" placeholder="Passwort">
        <!-- WICHTIG: Die ID muss exakt registerBtn heißen -->
        <button id="registerBtn">Registrieren</button>
        <p id="registerError" class="error"></p>
        <a href="#" id="switchToLogin">Schon Account? Einloggen</a>
      </div>
      
    </div>
  </div>

  <!-- Chat Bereich -->
  <div id="chatContainer" class="hidden">
    <div class="chat-main">
      <div id="messages"></div>
      <div class="input-area">
        <input type="text" id="messageInput" placeholder="Nachricht schreiben..." maxlength="200">
        <button id="sendBtn">Senden</button>
      </div>
    </div>
    <div class="sidebar">
      <h3>Mitglieder</h3>
      <ul id="onlineList"></ul>
    </div>
  </div>

  <!-- Das Slide-Out Games-Menü -->
  <div id="gamesMenu" class="games-menu">
    <button id="toggleGamesBtn" class="toggle-btn">🎮</button>
    <div class="games-list">
      <a href="https://makeitmeme.com/de/" target="_blank" class="game-btn meme">Make It Meme</a>
      <a href="https://skribbl.io/" target="_blank" class="game-btn skribbl">Skribbl.io</a>
      <a href="https://agar.io/" target="_blank" class="game-btn agario">Agar.io</a>
      <a href="https://openguessr.com/multiplayer" target="_blank" class="game-btn guessr">OpenGuessr</a>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
